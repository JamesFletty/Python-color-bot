[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
  "hair_color_db/batches",
  "hair_color_db/sources",
]

[tool.ruff.lint]
# Start with correctness-oriented rules that can catch syntax, name-resolution,
# and control-flow mistakes without requiring a repository-wide style cleanup.
select = ["E9", "F63", "F7", "F82"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_configs = true
no_implicit_optional = true
follow_imports = "skip"
