services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: haircolor
      POSTGRES_PASSWORD: haircolor
      POSTGRES_DB: haircolor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haircolor -d haircolor"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://haircolor:haircolor@postgres:5432/haircolor
      ENVIRONMENT: development
      BOOTSTRAP_ON_START: "1"
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
