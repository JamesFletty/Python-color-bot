name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: haircolor
          POSTGRES_PASSWORD: haircolor
          POSTGRES_DB: haircolor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haircolor -d haircolor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://haircolor:haircolor@localhost:5432/haircolor

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff mypy

      - name: Lint
        run: ruff check .

      - name: Type check focused engine modules
        run: mypy hair_color_db/formulation_rules/evaluator.py hair_color_db/stage13_formulation_rules/resolver.py hair_color_db/production/migrate.py hair_color_db/production/pg_test_utils.py hair_color_db/production/fill_shade_lookup.py hair_color_db/production/formula_builder.py hair_color_db/production/repositories.py hair_color_db/production/safety_checks.py hair_color_db/production/engine_models.py

      - name: Build SQLite catalog for parity tests
        run: python init_db.py

      - name: Run unit and PostgreSQL tests
        run: >-
          python -m unittest
          api.test_api
          src.test_fill_shade_lookup
          src.test_formula_builder
          src.test_sub_range_intake
          hair_color_db.stage13_formulation_rules.test_stage13_validation
          hair_color_db.stage13_formulation_rules.test_deposit_fill_rules
          hair_color_db.production.test_engine
          hair_color_db.production.test_migrate
          hair_color_db.production.test_pg_e2e
          hair_color_db.production.test_pg_shade_matching
          hair_color_db.production.test_import_stage12_research
          hair_color_db.production.test_import_stage13_rules
          hair_color_db.production.test_cross_engine_validation
          -v
