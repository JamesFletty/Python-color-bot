name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check app scripts tests/v2

  v2-tests:
    name: v2 unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run v2 tests
        run: PYTHONPATH=. python3 -m unittest discover -s tests/v2 -v

  postgres-tests:
    name: v2 PostgreSQL integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: haircolor
          POSTGRES_PASSWORD: haircolor
          POSTGRES_DB: haircolor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haircolor -d haircolor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://haircolor:haircolor@localhost:5432/haircolor

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Bootstrap v2 database
        run: PYTHONPATH=. python3 scripts/bootstrap_v2.py

      - name: Run v2 API tests against PostgreSQL
        run: PYTHONPATH=. python3 -m unittest tests.v2.test_api -v
